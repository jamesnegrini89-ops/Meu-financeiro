<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Controle financeiro pessoal inteligente">
  
  <title>Meu Financeiro</title>
  
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  
  <link rel="stylesheet" href="css/app.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <header>
    <div class="container">
      <h1>💰 Meu Financeiro</h1>
      <nav>
        <button class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
        <button class="nav-btn" data-page="transactions">📝 Transações</button>
        <button class="nav-btn" data-page="budget">🎯 Orçamento</button>
      </nav>
    </div>
  </header>

  <main class="container">
    
    <!-- ==================== PÁGINA: DASHBOARD ==================== -->
    <div id="dashboard-page" class="page active">
      
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Saldo Atual</h3>
          <div class="value" id="balance-value">R$ 0,00</div>
          <div class="change muted" id="balance-change">-</div>
        </div>
        
        <div class="stat-card">
          <h3>Receitas</h3>
          <div class="value good" id="income-value">R$ 0,00</div>
          <div class="change muted" id="income-change">-</div>
        </div>
        
        <div class="stat-card">
          <h3>Despesas</h3>
          <div class="value bad" id="expense-value">R$ 0,00</div>
          <div class="change muted" id="expense-change">-</div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        
        <div class="card">
          <h2>📊 Despesas por Categoria</h2>
          <div class="chart-container">
            <canvas id="expense-chart"></canvas>
          </div>
        </div>

        <div class="card">
          <h2>📈 Receitas vs Despesas</h2>
          <div class="chart-container">
            <canvas id="income-chart"></canvas>
          </div>
        </div>

      </div>

      <div class="card">
        <h2>💸 Últimas Transações</h2>
        <div id="recent-transactions"></div>
      </div>

    </div>

    <!-- ==================== PÁGINA: TRANSAÇÕES ==================== -->
    <div id="transactions-page" class="page">
      
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2>📝 Minhas Transações</h2>
          <button class="btn" onclick="openTransactionModal()">➕ Nova Transação</button>
        </div>

        <div class="filters">
          <div class="form-group">
            <label>Tipo</label>
            <select id="filter-type">
              <option value="">Todos</option>
              <option value="income">Receitas</option>
              <option value="expense">Despesas</option>
            </select>
          </div>

          <div class="form-group">
            <label>Categoria</label>
            <select id="filter-category">
              <option value="">Todas</option>
            </select>
          </div>

          <div class="form-group">
            <label>Mês</label>
            <input type="month" id="filter-month">
          </div>
        </div>

        <div class="filter-actions">
          <button class="btn btn-secondary btn-small" onclick="applyFilters()">🔍 Filtrar</button>
          <button class="btn btn-secondary btn-small" onclick="clearFilters()">🔄 Limpar</button>
        </div>

        <div id="transactions-list" style="margin-top: 20px;"></div>
      </div>

    </div>

    <!-- ==================== PÁGINA: ORÇAMENTO ==================== -->
    <div id="budget-page" class="page">
      
      <div class="card">
        <div class="budget-header">
          <div>
            <h2>🎯 Orçamento Mensal</h2>
            <p class="muted">Defina limites para suas categorias</p>
          </div>
          <button class="btn" onclick="openBudgetModal()">➕ Definir Orçamento</button>
        </div>

        <div id="budget-list"></div>
      </div>

    </div>

  </main>

  <!-- ==================== MODAL: NOVA TRANSAÇÃO ==================== -->
  <div id="transaction-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="transaction-modal-title">Nova Transação</h2>
        <button class="modal-close" onclick="closeTransactionModal()">✕</button>
      </div>
      <div class="modal-body">
        <form id="transaction-form">
          
          <div class="form-group">
            <label>Tipo *</label>
            <select id="trans-type" required onchange="updateCategoryOptions()">
              <option value="">Selecione</option>
              <option value="income">💰 Receita</option>
              <option value="expense">💸 Despesa</option>
            </select>
          </div>

          <div class="form-group">
            <label>Categoria *</label>
            <select id="trans-category" required>
              <option value="">Selecione o tipo primeiro</option>
            </select>
          </div>

          <div class="form-group">
            <label>Valor (R$) *</label>
            <input type="number" id="trans-value" step="0.01" min="0" required placeholder="0,00">
          </div>

          <div class="form-group">
            <label>Data *</label>
            <input type="date" id="trans-date" required>
          </div>

          <div class="form-group">
            <label>Descrição</label>
            <textarea id="trans-description" placeholder="Opcional"></textarea>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeTransactionModal()">Cancelar</button>
        <button class="btn" onclick="saveTransaction()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ==================== MODAL: DEFINIR ORÇAMENTO ==================== -->
  <div id="budget-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Definir Orçamento</h2>
        <button class="modal-close" onclick="closeBudgetModal()">✕</button>
      </div>
      <div class="modal-body">
        <form id="budget-form">
          
          <div class="form-group">
            <label>Categoria *</label>
            <select id="budget-category" required>
              <option value="">Selecione</option>
            </select>
          </div>

          <div class="form-group">
            <label>Limite Mensal (R$) *</label>
            <input type="number" id="budget-limit" step="0.01" min="0" required placeholder="0,00">
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeBudgetModal()">Cancelar</button>
        <button class="btn" onclick="saveBudget()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="js/app.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/charts.js"></script>

</body>
</html>
